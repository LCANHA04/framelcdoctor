# FrameLCDoctor game profile - Vampyr (Dontnod, Unreal Engine 4)

[game]
name   = "Vampyr"
exe    = "AVGame-Win64-Shipping.exe"
engine = "Unreal Engine 4"

[graphics]
api  = "d3d11"
proxy_dll = "d3d11.dll"
presents_per_frame = 1

[timing]
fixed_timestep = false        # UE4 uses a real (variable) delta; uncapping is safe

[config]
# UE4 GameUserSettings.ini. The sg.* scalability keys are globally unique in the file,
# so the flat-ini handler matches them fine.
base   = "localappdata"
path   = "AVGame/Saved/Config/WindowsNoEditor/GameUserSettings.ini"
format = "ini-flat"

[preset.fps]
# Low-end / max-fps: all quality groups to lowest (Vampyr is CPU/game-thread bound,
# so the CPU-side ones - view distance, foliage, effects - matter most). Resolution
# is left untouched (the GPU is idle; lowering it would only blur).
sg.ViewDistanceQuality = 0
sg.ShadowQuality       = 0
sg.AntiAliasingQuality = 0
sg.PostProcessQuality  = 0
sg.TextureQuality      = 0
sg.EffectsQuality      = 0
sg.FoliageQuality      = 0

[notes]
# Single-player, no anti-cheat. Tends to be game-thread (CPU single-core) bound:
# GPU often idle while one CPU core is maxed. More fps comes from lowering CPU-side
# settings (draw distance, density, dynamic shadows), not resolution.
